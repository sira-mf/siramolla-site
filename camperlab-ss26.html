
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>gentle monster bold</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #fff;
      color: #2a2a2a;
      font-family: "Freight Text", Georgia, serif;
      font-size: 15px;
      line-height: 1.2;
      text-transform: lowercase;
    }

    main {
      padding: 12px 6px 6px;
    }

    @media (max-width: 700px) {
      main {
        padding-top: 32px;
      }
    }

    p {
      margin: 0;
    }

    .title {
      margin-bottom: 10px;
    }

    .credits {
      margin-bottom: 10px;
      columns: 1;
    }

    /* MEDIA */

    .media {
      width: 100%;
      display: block;
    }

    .hero {
      margin-bottom: 10px;
    }

    .dump img,
    .dump video {
      margin: 0;
    }

    video {
      background: #000;
    }

    /* MUTE BUTTON */

    .video-wrapper {
      position: relative;
    }

    .mute-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      padding: 6px 8px;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <main>

    <!-- NAME -->
    <p class="title">camperlab ss26</p>

    <!-- HERO VIDEO -->
    <div class="video-wrapper hero">
      <video id="gmVideo" class="media" autoplay muted loop playsinline preload="auto">
        <source src="assets/camperlab-ss26/camperlab-ss26.mp4" type="video/mp4">
      </video>

      <button class="mute-btn" onclick="toggleMute()">sound</button>
    </div>

    <!-- CREDITS -->
    <p class="credits">
brand art director: emanuela amato<br>
brand & collection director: lauri kopio<br>
illustration: noha manfredi<br>
direction: olimpic, mau morgó<br>
creative direction & production: olimpic<br>
ep & head of production: sira mollá<br>
project coordinator: dafne vázquez
</p>

    <!-- DUMP -->
    <div class="dump">


    </div>

  </main>

  <script>
    const video = document.getElementById("gmVideo");

    function toggleMute() {
      video.muted = !video.muted;
    }
  </script>

</body>
</html>
